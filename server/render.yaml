services:
  - type: web
    name: codehire-backend
    env: node
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: DB_HOST
        value: your_railway_host
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: your_password
      - key: DB_NAME
        value: codehire
      - key: JWT_SECRET
        value: codehire_secret_key_2026
      - key: PORT
        value: 5000